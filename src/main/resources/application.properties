spring.application.name=eRegistrarWebAPI

# Matches http://localhost (port 80) from the spec; change to 8080 to avoid requiring root/admin privileges
server.port=80

# Database — update credentials to match your local MySQL instance
spring.datasource.url=jdbc:mysql://localhost:3306/eregistrar_db
spring.datasource.username=root
spring.datasource.password=Admin456

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
